<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sign in — Washington Rural Strategy</title>
  <link rel="stylesheet" href="/styles/site.css" />
</head>
<body class="login-page">
  <main class="page login-page-main">
    <article class="page-card login-card">
      <h1>Washington Rural Strategy</h1>
      <p class="lede">Sign in to access project maps and research data.</p>

      <form id="login-form" class="login-form">
        <label class="field">
          <span>Username</span>
          <input name="username" type="text" autocomplete="username" autocapitalize="words" spellcheck="false" placeholder="Frank or Leo" required />
        </label>
        <label class="field">
          <span>Password</span>
          <input name="password" type="password" autocomplete="current-password" required />
        </label>
        <p id="login-error" class="login-error" hidden></p>
        <button type="submit" class="login-button">Sign in</button>
      </form>
    </article>
  </main>
  <script src="/js/auth.js"></script>
</body>
</html>
